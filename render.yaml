# Blueprint Render: https://render.com/docs/blueprint-spec
# ВАЖНО: без --host 0.0.0.0 uvicorn слушает 127.0.0.1 → Render: "no open ports" / Port scan timeout.
# Если сервис уже создан вручную — скопируйте startCommand в Settings или используйте Procfile.
services:
  - type: web
    name: inn
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
